name: intraday-buy-levels

# 미국 정규장: 09:30-16:00 ET
#  - EDT(서머타임, 3월~11월): 13:30-20:00 UTC
#  - EST(겨울, 11월~3월):     14:30-21:00 UTC
# 두 기간을 모두 커버하기 위해 13:30-21:00 UTC 동안 5분마다 실행.
# 국내 정규장(09:00-15:30 KST = 00:00-06:30 UTC)도 5분마다 실행.
# (장 외 시간에 돌아도 가격 변화가 신규 레벨을 만들지 않으면 알림 없음)
on:
  schedule:
    - cron: "*/5 13-20 * * 1-5"   # 평일 13:00-20:59 UTC, 5분 간격
    - cron: "0,5,10,15,20,25,30,35,40,45,50,55 21 * * 1-5"  # 21:xx UTC (EST 마감 커버)
    - cron: "*/5 0-6 * * 1-5"     # 국내 정규장 09:00-15:30 KST = 00:00-06:30 UTC
  workflow_dispatch: {}            # 수동 실행 버튼

concurrency:
  group: intraday
  cancel-in-progress: false

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - run: pip install -r engine/requirements.txt
      - name: Run intraday engine
        working-directory: engine
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SECRET_KEY: ${{ secrets.SUPABASE_SECRET_KEY }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
        run: python run.py intraday
