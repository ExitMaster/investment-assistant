name: indicator-signals

# 보조지표(DMI/거래량)는 일봉 확정 기준이 가장 정확.
# 대표 시점에 실행:
#  - 장 마감 후 확정:  EDT 16:05 ET = 20:05 UTC / EST = 21:05 UTC
#  - 장 시작 +20분:    EDT 09:50 ET = 13:50 UTC / EST = 14:50 UTC
#  - 장 마감 2시간 전:  EDT 14:00 ET = 18:00 UTC / EST = 19:00 UTC
# (개인별 알림 시각 정밀 매칭은 후속 반복에서 settings.indicator_alert_times 활용)
on:
  schedule:
    - cron: "5 20 * * 1-5"    # 마감 후 (EDT)
    - cron: "5 21 * * 1-5"    # 마감 후 (EST)
    - cron: "50 13 * * 1-5"   # 시작+20분 (EDT)
    - cron: "50 14 * * 1-5"   # 시작+20분 (EST)
    - cron: "0 18 * * 1-5"    # 마감 2시간 전 (EDT)
    - cron: "0 19 * * 1-5"    # 마감 2시간 전 (EST)
  workflow_dispatch: {}

concurrency:
  group: indicators
  cancel-in-progress: false

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - run: pip install -r engine/requirements.txt
      - name: Run indicator engine
        working-directory: engine
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SECRET_KEY: ${{ secrets.SUPABASE_SECRET_KEY }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
        run: python run.py indicators
